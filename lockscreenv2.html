<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sink OS V2 Lockscreen</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .time {
      font-size: 80px;
      font-weight: bold;
      text-align: center;
    }

    .date {
      font-size: 24px;
      margin-top: 10px;
      text-align: center;
    }

    .password-container {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    input[type="password"] {
      padding: 10px;
      font-size: 18px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    #feedback {
      margin-top: 10px;
      color: red;
    }
  </style>
</head>
<body>
  <div class="time" id="timeDisplay"></div>
  <div class="date" id="dateDisplay"></div>

  <div class="password-container" id="passwordContainer">
    <input type="password" id="passwordInput" placeholder="Enter password" />
    <button id="submitBtn">Unlock</button>
    <div id="feedback"></div>
  </div>

  <!-- Link compiled JS -->
  <script type="module" src="dist/lockscreen.js"></script>
</body>
</html>
