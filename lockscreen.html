<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sink OS V2 Lockscreen</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .time {
      font-size: 80px;
      font-weight: bold;
      text-align: center;
    }

    .date {
      font-size: 24px;
      margin-top: 10px;
      text-align: center;
    }

    .password-container {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    input[type="password"] {
      padding: 10px;
      font-size: 18px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    #feedback {
      margin-top: 10px;
      color: red;
    }
  </style>
</head>
<body>
  <div class="time" id="timeDisplay"></div>
  <div class="date" id="dateDisplay"></div>

  <div class="password-container" id="passwordContainer">
    <input type="password" id="passwordInput" placeholder="Enter password" />
    <button id="submitBtn">Unlock</button>
    <div id="feedback"></div>
  </div>

  <script>
    // Set password in localStorage (demo only)
    if (!localStorage.getItem("sinkPassword")) {
      localStorage.setItem("sinkPassword", "mySecret123");
    }

    const timeDisplay = document.getElementById("timeDisplay");
    const dateDisplay = document.getElementById("dateDisplay");
    const passwordContainer = document.getElementById("passwordContainer");
    const passwordInput = document.getElementById("passwordInput");
    const submitBtn = document.getElementById("submitBtn");
    const feedback = document.getElementById("feedback");

    function updateTime() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, "0");
      const minutes = now.getMinutes().toString().padStart(2, "0");
      timeDisplay.textContent = `${hours}:${minutes}`;

      const options = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
      dateDisplay.textContent = now.toLocaleDateString(undefined, options);
    }

    updateTime();
    setInterval(updateTime, 1000);

    function showPasswordPrompt() {
      timeDisplay.style.display = "none";
      dateDisplay.style.display = "none";
      passwordContainer.style.display = "flex";
      passwordInput.focus();
    }

    document.body.addEventListener("click", showPasswordPrompt);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && passwordContainer.style.display !== "flex") {
        showPasswordPrompt();
      }
    });

    submitBtn.addEventListener("click", () => {
      const storedPassword = localStorage.getItem("sinkPassword");
      const enteredPassword = passwordInput.value;

      if (enteredPassword === storedPassword) {
        feedback.textContent = "Access granted.";
        feedback.style.color = "lime";
        // You can trigger unlock logic here
      } else {
        feedback.textContent = "Incorrect password.";
        feedback.style.color = "red";
      }
    });
  </script>
</body>
</html>
